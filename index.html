<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>젤피부과 | 메인</title>
  <meta name="description" content="젤피부과 - Pinnacle Device Exhibition Experience. 프리미엄 피부과 시술과 최첨단 장비를 경험하세요." />
  <meta property="og:title" content="젤피부과 | ZELL DERMATOLOGY" />
  <meta property="og:description" content="프리미엄 피부과 시술과 최첨단 장비를 경험하세요." />
  <meta property="og:image" content="images/main_hero.jpg" />
  <meta property="og:type" content="website" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Pretendard:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #070d1a;
      --bg-soft: #0d1628;
      --gold: #c9a96e;
      --gold-soft: rgba(201, 169, 110, 0.35);
      --text: #eef2ff;
      --muted: rgba(238, 242, 255, 0.7);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { background: var(--bg); color: var(--text); overflow-x: hidden; }
    body { font-family: "Pretendard", "Noto Sans KR", sans-serif; }
    img { width: 100%; display: block; }

    .pc-only {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 99999;
      background: #02060f;
      color: #fff;
      font-size: 18px;
      letter-spacing: 0.05em;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
    }
    @media (max-width: 1199px) { .pc-only { display: flex; } }

    .loader {
      position: fixed;
      inset: 0;
      z-index: 9999;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at 50% 30%, #14213d 0%, #070d1a 55%, #04070f 100%);
      transition: opacity .6s ease, visibility .6s ease;
    }
    .loader.hidden { opacity: 0; visibility: hidden; }
    .loader h1 {
      font-family: "Playfair Display", serif;
      color: var(--gold);
      font-size: clamp(34px, 4vw, 62px);
      letter-spacing: 0.35em;
      animation: loaderPulse 1.8s ease-in-out infinite;
    }
    @keyframes loaderPulse {
      0%, 100% { opacity: .35; text-shadow: 0 0 0 rgba(201, 169, 110, 0); }
      50% { opacity: 1; text-shadow: 0 0 35px rgba(201, 169, 110, .45); }
    }

    .nav {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      z-index: 999;
      border-bottom: 1px solid rgba(255,255,255,.08);
      background: linear-gradient(180deg, rgba(7,13,26,.88), rgba(7,13,26,.56));
      backdrop-filter: blur(10px);
    }
    .nav-inner {
      width: min(1680px, calc(100vw - 120px));
      height: 84px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .logo {
      font-family: "Playfair Display", serif;
      font-size: 28px;
      letter-spacing: .2em;
      color: var(--gold);
    }
    .nav ul { list-style: none; display: flex; gap: 34px; }
    .nav a {
      color: var(--text);
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      letter-spacing: .09em;
      position: relative;
      padding: 4px 0;
    }
    .nav a::after {
      content: "";
      position: absolute;
      left: 0;
      bottom: -4px;
      width: 0;
      height: 1px;
      background: var(--gold);
      transition: width .35s ease;
    }
    .nav a:hover::after,
    .nav a.active::after { width: 100%; }

    .hero {
      position: relative;
      min-height: 100vh;
      overflow: hidden;
      background: #040811;
    }
    .hero-media {
      position: absolute;
      inset: 0;
      background: url("images/hero_video.jpg") center center / cover no-repeat;
      transform-origin: center;
      will-change: transform;
    }
    .hero::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 20% 30%, rgba(201,169,110,.28), transparent 32%),
        radial-gradient(circle at 80% 25%, rgba(105,142,255,.16), transparent 38%),
        linear-gradient(180deg, rgba(1,5,14,.2), rgba(1,5,14,.78));
      z-index: 1;
    }
    .particles {
      position: absolute;
      inset: 0;
      overflow: hidden;
      z-index: 2;
      pointer-events: none;
    }
    .particle {
      position: absolute;
      border-radius: 999px;
      background: radial-gradient(circle, rgba(201,169,110,.95), rgba(201,169,110,0));
      filter: blur(.2px);
      opacity: 0;
      animation: sparkle linear infinite;
    }
    @keyframes sparkle {
      0% { transform: translate3d(0, 20px, 0) scale(.2); opacity: 0; }
      20% { opacity: .9; }
      100% { transform: translate3d(18px, -120px, 0) scale(1); opacity: 0; }
    }

    .hero-content {
      position: relative;
      z-index: 3;
      min-height: 100vh;
      display: grid;
      place-items: center;
      text-align: center;
      padding-top: 84px;
    }
    .hero-copy h1 {
      font-family: "Playfair Display", serif;
      font-size: clamp(42px, 6vw, 88px);
      letter-spacing: .08em;
      margin-bottom: 20px;
      text-shadow: 0 0 80px rgba(201,169,110,.35), 0 0 160px rgba(201,169,110,.15);
    }
    .hero-copy h1 span { color: var(--gold); }
    .hero-copy p {
      color: var(--muted);
      letter-spacing: .32em;
      font-size: clamp(12px, 1.1vw, 16px);
    }

    .scroll-mark {
      position: absolute;
      bottom: 46px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 3;
      text-align: center;
      color: rgba(255,255,255,.65);
      font-size: 11px;
      letter-spacing: .22em;
    }
    .scroll-line {
      margin: 12px auto 0;
      width: 1px;
      height: 64px;
      background: rgba(201,169,110,.25);
      overflow: hidden;
      position: relative;
    }
    .scroll-line::after {
      content: "";
      position: absolute;
      width: 1px;
      height: 28px;
      left: 0;
      top: -28px;
      background: var(--gold);
      animation: scrollBar 1.9s ease-in-out infinite;
    }
    @keyframes scrollBar { to { top: 64px; } }

    .image-section {
      position: relative;
      width: min(1920px, 100%);
      margin: 0 auto;
      background: var(--bg);
    }
    .image-section img {
      width: 100%;
      height: auto;
      display: block;
    }

    footer {
      padding: 24px 0 40px;
      text-align: center;
      color: rgba(255,255,255,.58);
      font-size: 12px;
      letter-spacing: .12em;
      background: #050912;
    }
  </style>
</head>
<body>
  <div class="pc-only">PC 전용 프레젠테이션 페이지입니다.<br />1200px 이상 해상도에서 확인해 주세요.</div>

  <div class="loader" id="loader"><h1>ZELL</h1></div>

  <nav class="nav" id="nav">
    <div class="nav-inner">
      <div class="logo">ZELL</div>
      <ul>
        <li><a href="#">ABOUT</a></li>
        <li><a class="active" href="sub.html">탄력&리프팅</a></li>
        <li><a href="#">PROGRAM</a></li>
        <li><a href="#">LASER</a></li>
        <li><a href="#">CONTACT</a></li>
      </ul>
    </div>
  </nav>

  <header class="hero" id="hero">
    <div class="hero-media" id="heroMedia"></div>
    <div class="particles" id="particles"></div>
    <div class="hero-content">
      <div class="hero-copy">
        <h1><span>ZELL</span> DERMATOLOGY</h1>
        <p>PINNACLE DEVICE EXHIBITION EXPERIENCE</p>
      </div>
    </div>
    <div class="scroll-mark">SCROLL<div class="scroll-line"></div></div>
  </header>

  <section class="image-section fx"><img src="images/main_hero.jpg" alt="젤피부과 메인 히어로" /></section>
  <section class="image-section fx"><img src="images/main_pinnacle.jpg" alt="젤피부과 pinnacle 장비" loading="lazy" /></section>
  <section class="image-section fx"><img src="images/main_programs.jpg" alt="젤피부과 프로그램" loading="lazy" /></section>
  <section class="image-section fx"><img src="images/main_laser.jpg" alt="젤피부과 레이저 장비" loading="lazy" /></section>
  <section class="image-section fx"><img src="images/main_concept.jpg" alt="젤피부과 컨셉" loading="lazy" /></section>
  <section class="image-section fx"><img src="images/main_before.jpg" alt="젤피부과 전후 사례" loading="lazy" /></section>
  <section class="image-section fx"><img src="images/main_info.jpg" alt="젤피부과 정보" loading="lazy" /></section>
  <section class="image-section fx"><img src="images/main_map.jpg" alt="젤피부과 위치" loading="lazy" /></section>
  <section class="image-section fx"><img src="images/main_footer.jpg" alt="젤피부과 푸터" loading="lazy" /></section>

  <footer>© ZELL DERMATOLOGY CLINIC PRESENTATION</footer>

  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/ScrollTrigger.min.js"></script>
  <script>
    gsap.registerPlugin(ScrollTrigger);

    /* === 로더: 빠르게 사라짐 === */
    window.addEventListener("load", () => {
      gsap.to("#loader", { autoAlpha: 0, duration: 0.6, ease: "power2.out", delay: 0.4 });
    });

    /* === 히어로: 파티클 생성 === */
    const particleWrap = document.getElementById("particles");
    for (let i = 0; i < 48; i++) {
      const dot = document.createElement("span");
      dot.className = "particle";
      const size = gsap.utils.random(2, 6, 1);
      dot.style.width = size + "px";
      dot.style.height = size + "px";
      dot.style.left = gsap.utils.random(0, 100) + "%";
      dot.style.top = gsap.utils.random(35, 100) + "%";
      dot.style.animationDuration = gsap.utils.random(4.8, 9.5, 0.1) + "s";
      dot.style.animationDelay = gsap.utils.random(0, 5, 0.1) + "s";
      particleWrap.appendChild(dot);
    }

    /* === 히어로: 배경 느린 줌 + 패럴랙스 === */
    const heroMedia = document.getElementById("heroMedia");
    gsap.to(heroMedia, {
      scale: 1.15,
      duration: 20,
      ease: "sine.inOut",
      repeat: -1,
      yoyo: true
    });
    gsap.to(heroMedia, {
      y: 120,
      ease: "none",
      scrollTrigger: { trigger: "#hero", start: "top top", end: "bottom top", scrub: true }
    });

    /* === 히어로: 텍스트 등장 + 글로우 펄스 === */
    gsap.from(".hero-copy h1", { y: 60, opacity: 0, duration: 1.4, delay: 0.5, ease: "power3.out" });
    gsap.from(".hero-copy p", { y: 30, opacity: 0, duration: 1.2, delay: 0.8, ease: "power3.out" });
    gsap.to(".hero-copy h1", {
      textShadow: "0 0 120px rgba(201,169,110,.5), 0 0 240px rgba(201,169,110,.2)",
      duration: 3,
      repeat: -1,
      yoyo: true,
      ease: "sine.inOut"
    });

    /* === 이미지 섹션: 단순 페이드업 (깨짐 없음) === */
    gsap.utils.toArray(".fx").forEach(section => {
      gsap.fromTo(section,
        { opacity: 0, y: 60 },
        {
          opacity: 1,
          y: 0,
          duration: 0.8,
          ease: "power2.out",
          scrollTrigger: {
            trigger: section,
            start: "top 85%",
            toggleActions: "play none none none"
          }
        }
      );
    });

    /* === 네비게이션 스크롤 숨김 === */
    let lastY = 0;
    const nav = document.getElementById("nav");
    window.addEventListener("scroll", () => {
      const y = window.scrollY;
      nav.style.transform = (y > lastY && y > 180) ? "translateY(-100%)" : "translateY(0)";
      nav.style.transition = "transform .4s ease";
      lastY = y;
    });
  </script>
</body>
</html>
