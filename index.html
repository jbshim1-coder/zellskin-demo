<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>젤피부과 | 메인</title>
  <meta name="description" content="젤피부과 - Pinnacle Device Exhibition Experience. 프리미엄 피부과 시술과 최첨단 장비를 경험하세요." />
  <meta property="og:title" content="젤피부과 | ZELL DERMATOLOGY" />
  <meta property="og:description" content="프리미엄 피부과 시술과 최첨단 장비를 경험하세요." />
  <meta property="og:image" content="images/hero_video.jpg" />
  <meta property="og:type" content="website" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Pretendard:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #070d1a;
      --gold: #c9a96e;
      --text: #eef2ff;
      --muted: rgba(238, 242, 255, 0.7);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { background: var(--bg); color: var(--text); overflow-x: hidden; }
    body { font-family: "Pretendard", "Noto Sans KR", sans-serif; }
    img { width: 100%; display: block; }

    .pc-only {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 99999;
      background: #02060f;
      color: #fff;
      font-size: 18px;
      letter-spacing: 0.05em;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
    }
    @media (max-width: 1199px) { .pc-only { display: flex; } }

    /* === 로더 === */
    .loader {
      position: fixed;
      inset: 0;
      z-index: 9999;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at 50% 30%, #14213d 0%, #070d1a 55%, #04070f 100%);
    }
    .loader h1 {
      font-family: "Playfair Display", serif;
      color: var(--gold);
      font-size: clamp(34px, 4vw, 62px);
      letter-spacing: 0.35em;
      animation: loaderPulse 1.8s ease-in-out infinite;
    }
    @keyframes loaderPulse {
      0%, 100% { opacity: .35; text-shadow: 0 0 0 rgba(201,169,110,0); }
      50% { opacity: 1; text-shadow: 0 0 35px rgba(201,169,110,.45); }
    }

    /* === 네비게이션 === */
    .nav {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      z-index: 999;
      border-bottom: 1px solid rgba(255,255,255,.08);
      background: linear-gradient(180deg, rgba(7,13,26,.88), rgba(7,13,26,.56));
      backdrop-filter: blur(10px);
    }
    .nav-inner {
      width: min(1680px, calc(100vw - 120px));
      height: 84px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .logo {
      font-family: "Playfair Display", serif;
      font-size: 28px;
      letter-spacing: .2em;
      color: var(--gold);
    }
    .nav ul { list-style: none; display: flex; gap: 34px; }
    .nav a {
      color: var(--text);
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      letter-spacing: .09em;
      position: relative;
      padding: 4px 0;
    }
    .nav a::after {
      content: "";
      position: absolute;
      left: 0;
      bottom: -4px;
      width: 0;
      height: 1px;
      background: var(--gold);
      transition: width .35s ease;
    }
    .nav a:hover::after,
    .nav a.active::after { width: 100%; }

    /* === 히어로: 풀스크린 애니메이션 영역 === */
    .hero {
      position: relative;
      width: 100%;
      height: 100vh;
      overflow: hidden;
      background: #040811;
    }
    .hero-bg {
      position: absolute;
      inset: 0;
      background: url("images/hero_video.jpg") center center / cover no-repeat;
      will-change: transform;
    }
    .hero::after {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 50% 40%, rgba(201,169,110,.15), transparent 50%),
        linear-gradient(180deg, rgba(4,8,17,.3) 0%, rgba(4,8,17,.6) 100%);
      z-index: 1;
      pointer-events: none;
    }

    .hero-intro {
      position: absolute;
      inset: 0;
      z-index: 2;
      display: grid;
      place-items: center;
      pointer-events: none;
    }
    .hero-intro-text { text-align: center; }
    .hero-intro-text h1 {
      font-family: "Playfair Display", serif;
      font-size: clamp(48px, 7vw, 110px);
      letter-spacing: .12em;
      color: var(--gold);
      text-shadow: 0 0 80px rgba(201,169,110,.5), 0 0 160px rgba(201,169,110,.2);
      opacity: 0;
    }
    .hero-intro-text p {
      font-size: clamp(12px, 1.3vw, 20px);
      letter-spacing: .4em;
      color: var(--muted);
      margin-top: 20px;
      opacity: 0;
    }
    .hero-intro-line {
      width: 0;
      height: 1px;
      background: var(--gold);
      margin: 28px auto 0;
    }

    .scroll-mark {
      position: absolute;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 3;
      text-align: center;
      color: rgba(255,255,255,.6);
      font-size: 11px;
      letter-spacing: .22em;
    }
    .scroll-line {
      margin: 10px auto 0;
      width: 1px;
      height: 56px;
      background: rgba(201,169,110,.25);
      overflow: hidden;
      position: relative;
    }
    .scroll-line::after {
      content: "";
      position: absolute;
      width: 1px;
      height: 24px;
      left: 0;
      top: -24px;
      background: var(--gold);
      animation: scrollBar 1.9s ease-in-out infinite;
    }
    @keyframes scrollBar { to { top: 56px; } }

    /* === 이미지 섹션 === */
    .static-section {
      width: min(1920px, 100%);
      margin: 0 auto;
      overflow: hidden;
    }
    .static-section img {
      width: 100%;
      height: auto;
      display: block;
    }

    footer {
      padding: 24px 0 40px;
      text-align: center;
      color: rgba(255,255,255,.58);
      font-size: 12px;
      letter-spacing: .12em;
      background: #050912;
    }
  </style>
</head>
<body>
  <div class="pc-only">PC 전용 프레젠테이션 페이지입니다.<br />1200px 이상 해상도에서 확인해 주세요.</div>

  <div class="loader" id="loader"><h1>ZELL</h1></div>

  <nav class="nav" id="nav">
    <div class="nav-inner">
      <div class="logo">ZELL</div>
      <ul>
        <li><a href="#">ABOUT</a></li>
        <li><a class="active" href="sub.html">탄력&리프팅</a></li>
        <li><a href="#">PROGRAM</a></li>
        <li><a href="#">LASER</a></li>
        <li><a href="#">CONTACT</a></li>
      </ul>
    </div>
  </nav>

  <!-- 1단: 풀스크린 애니메이션 히어로 -->
  <header class="hero" id="hero">
    <div class="hero-bg" id="heroBg"></div>
    <div class="hero-intro" id="heroIntro">
      <div class="hero-intro-text">
        <h1 id="introTitle">ZELL</h1>
        <div class="hero-intro-line" id="introLine"></div>
        <p id="introSub">PINNACLE DEVICE EXHIBITION</p>
      </div>
    </div>
    <div class="scroll-mark">SCROLL<div class="scroll-line"></div></div>
  </header>

  <!-- 2단: 정적 이미지 (애니메이션 없음, 깨짐 불가) -->
  <section class="static-section"><img src="images/hero_video.jpg" alt="젤피부과 메인" /></section>
  <section class="static-section"><img src="images/main_pinnacle.jpg" alt="젤피부과 pinnacle 장비" loading="lazy" /></section>
  <section class="static-section"><img src="images/main_programs.jpg" alt="젤피부과 프로그램" loading="lazy" /></section>
  <section class="static-section"><img src="images/main_laser.jpg" alt="젤피부과 레이저 장비" loading="lazy" /></section>
  <section class="static-section"><img src="images/main_concept.jpg" alt="젤피부과 컨셉" loading="lazy" /></section>
  <section class="static-section"><img src="images/main_before.jpg" alt="젤피부과 전후 사례" loading="lazy" /></section>
  <section class="static-section"><img src="images/main_info.jpg" alt="젤피부과 정보" loading="lazy" /></section>
  <section class="static-section"><img src="images/main_map.jpg" alt="젤피부과 위치" loading="lazy" /></section>
  <section class="static-section"><img src="images/main_footer.jpg" alt="젤피부과 푸터" loading="lazy" /></section>

  <footer>© ZELL DERMATOLOGY CLINIC PRESENTATION</footer>

  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/ScrollTrigger.min.js"></script>
  <script>
    gsap.registerPlugin(ScrollTrigger);

    /* ===========================
       로더 → 히어로 시네마틱 인트로
       =========================== */
    const tl = gsap.timeline();

    // 로더 페이드아웃
    tl.to("#loader", { autoAlpha: 0, duration: 0.5, ease: "power2.out", delay: 0.3 });

    // 배경: 느린 줌인
    tl.from("#heroBg", { scale: 1.2, duration: 4, ease: "power2.out" }, 0.5);

    // 텍스트 등장
    tl.to("#introTitle", { opacity: 1, duration: 1.5, ease: "power3.out" }, 1.0);
    tl.fromTo("#introTitle", { y: 50, letterSpacing: "0.05em" }, { y: 0, letterSpacing: "0.12em" }, 1.0);

    // 골드 라인 확장
    tl.to("#introLine", { width: "clamp(100px, 18vw, 280px)", duration: 0.8, ease: "power2.inOut" }, 2.0);

    // 서브 텍스트 등장
    tl.to("#introSub", { opacity: 1, duration: 0.8, ease: "power2.out" }, 2.4);

    // 텍스트 글로우 강화 (포즈)
    tl.to("#introTitle", {
      textShadow: "0 0 100px rgba(201,169,110,.8), 0 0 200px rgba(201,169,110,.4), 0 0 400px rgba(201,169,110,.15)",
      duration: 0.8, ease: "power2.in"
    }, 3.2);

    // 배경 계속 느린 줌
    gsap.to("#heroBg", {
      scale: 1.08,
      duration: 20,
      ease: "sine.inOut",
      repeat: -1,
      yoyo: true,
      delay: 4
    });

    // 스크롤 시 히어로 패럴랙스
    gsap.to("#heroBg", {
      y: 150,
      ease: "none",
      scrollTrigger: { trigger: "#hero", start: "top top", end: "bottom top", scrub: true }
    });

    /* ===========================
       이미지 섹션: 좌→우 1칸씩 슬라이드 등장 → 정적 고정
       =========================== */
    gsap.utils.toArray(".static-section").forEach((section) => {
      const img = section.querySelector("img");

      gsap.fromTo(img,
        { xPercent: -100, opacity: 0 },
        {
          xPercent: 0,
          opacity: 1,
          duration: 1.0,
          ease: "power3.out",
          scrollTrigger: {
            trigger: section,
            start: "top 85%",
            toggleActions: "play none none none"
          },
          onComplete: () => gsap.set(img, { clearProps: "all" })
        }
      );
    });

    /* ===========================
       네비게이션 스크롤 숨김
       =========================== */
    let lastY = 0;
    const nav = document.getElementById("nav");
    window.addEventListener("scroll", () => {
      const y = window.scrollY;
      nav.style.transform = (y > lastY && y > 180) ? "translateY(-100%)" : "translateY(0)";
      nav.style.transition = "transform .4s ease";
      lastY = y;
    });
  </script>
</body>
</html>
