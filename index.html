<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>젤피부과 | 메인</title>
  <meta name="description" content="젤피부과 - Pinnacle Device Exhibition Experience. 프리미엄 피부과 시술과 최첨단 장비를 경험하세요." />
  <meta property="og:title" content="젤피부과 | ZELL DERMATOLOGY" />
  <meta property="og:description" content="프리미엄 피부과 시술과 최첨단 장비를 경험하세요." />
  <meta property="og:image" content="images/hero_video.jpg" />
  <meta property="og:type" content="website" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Pretendard:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #070d1a;
      --gold: #c9a96e;
      --text: #eef2ff;
      --muted: rgba(238, 242, 255, 0.7);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { background: var(--bg); color: var(--text); overflow-x: hidden; }
    body { font-family: "Pretendard", "Noto Sans KR", sans-serif; }
    img { width: 100%; display: block; }

    .pc-only {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 99999;
      background: #02060f;
      color: #fff;
      font-size: 18px;
      letter-spacing: 0.05em;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
    }
    @media (max-width: 1199px) { .pc-only { display: flex; } }

    /* === 로더 === */
    .loader {
      position: fixed;
      inset: 0;
      z-index: 9999;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at 50% 30%, #14213d 0%, #070d1a 55%, #04070f 100%);
    }
    .loader h1 {
      font-family: "Playfair Display", serif;
      color: var(--gold);
      font-size: clamp(34px, 4vw, 62px);
      letter-spacing: 0.35em;
      animation: loaderPulse 1.8s ease-in-out infinite;
    }
    @keyframes loaderPulse {
      0%, 100% { opacity: .35; text-shadow: 0 0 0 rgba(201,169,110,0); }
      50% { opacity: 1; text-shadow: 0 0 35px rgba(201,169,110,.45); }
    }

    /* === 네비게이션 === */
    .nav {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      z-index: 999;
      border-bottom: 1px solid rgba(255,255,255,.08);
      background: linear-gradient(180deg, rgba(7,13,26,.88), rgba(7,13,26,.56));
      backdrop-filter: blur(10px);
    }
    .nav-inner {
      width: min(1680px, calc(100vw - 120px));
      height: 84px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .logo {
      font-family: "Playfair Display", serif;
      font-size: 28px;
      letter-spacing: .2em;
      color: var(--gold);
    }
    .nav ul { list-style: none; display: flex; gap: 34px; }
    .nav a {
      color: var(--text);
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      letter-spacing: .09em;
      position: relative;
      padding: 4px 0;
    }
    .nav a::after {
      content: "";
      position: absolute;
      left: 0;
      bottom: -4px;
      width: 0;
      height: 1px;
      background: var(--gold);
      transition: width .35s ease;
    }
    .nav a:hover::after,
    .nav a.active::after { width: 100%; }

    /* === 좌우 골드 BAR === */
    .side-bar-left,
    .side-bar-right {
      position: fixed;
      top: 84px;
      bottom: 0;
      width: 3px;
      z-index: 998;
      pointer-events: none;
      background: linear-gradient(180deg, rgba(201,169,110,.4), rgba(201,169,110,.1) 50%, rgba(201,169,110,.4));
    }
    .side-bar-left { left: 0; }
    .side-bar-right { right: 0; }

    /* === 히어로 이미지: 강한 지속 애니메이션 === */
    .hero-section {
      width: min(1920px, 100%);
      margin: 0 auto;
      overflow: hidden;
    }
    .hero-img-wrap {
      position: relative;
      overflow: hidden;
    }
    .hero-img-wrap img {
      width: 100%;
      height: auto;
      display: block;
      will-change: transform;
    }

    /* === 이미지 섹션 === */
    .static-section {
      width: min(1920px, 100%);
      margin: 0 auto;
    }
    .static-section img {
      width: 100%;
      height: auto;
      display: block;
    }

    footer {
      padding: 24px 0 40px;
      text-align: center;
      color: rgba(255,255,255,.58);
      font-size: 12px;
      letter-spacing: .12em;
      background: #050912;
    }
  </style>
</head>
<body>
  <div class="pc-only">PC 전용 프레젠테이션 페이지입니다.<br />1200px 이상 해상도에서 확인해 주세요.</div>

  <div class="loader" id="loader"><h1>ZELL</h1></div>

  <nav class="nav" id="nav">
    <div class="nav-inner">
      <div class="logo">ZELL</div>
      <ul>
        <li><a href="#">ABOUT</a></li>
        <li><a class="active" href="sub.html">탄력&리프팅</a></li>
        <li><a href="#">PROGRAM</a></li>
        <li><a href="#">LASER</a></li>
        <li><a href="#">CONTACT</a></li>
      </ul>
    </div>
  </nav>

  <!-- 좌우 골드 BAR -->
  <div class="side-bar-left"></div>
  <div class="side-bar-right"></div>

  <!-- 정적 이미지 섹션 (nav 아래부터) -->
  <div style="padding-top:84px;">
    <section class="hero-section" id="heroSection">
      <div class="hero-img-wrap">
        <img src="images/hero_video.jpg" alt="젤피부과 메인" id="heroImg" />
      </div>
    </section>
  </div>
  <section class="static-section"><img src="images/main_pinnacle.jpg" alt="젤피부과 pinnacle 장비" loading="lazy" /></section>
  <section class="static-section"><img src="images/main_programs.jpg" alt="젤피부과 프로그램" loading="lazy" /></section>
  <section class="static-section"><img src="images/main_laser.jpg" alt="젤피부과 레이저 장비" loading="lazy" /></section>
  <section class="static-section"><img src="images/main_concept.jpg" alt="젤피부과 컨셉" loading="lazy" /></section>
  <section class="static-section"><img src="images/main_before.jpg" alt="젤피부과 전후 사례" loading="lazy" /></section>
  <section class="static-section"><img src="images/main_info.jpg" alt="젤피부과 정보" loading="lazy" /></section>
  <section class="static-section"><img src="images/main_map.jpg" alt="젤피부과 위치" loading="lazy" /></section>
  <section class="static-section"><img src="images/main_footer.jpg" alt="젤피부과 푸터" loading="lazy" /></section>

  <footer>© ZELL DERMATOLOGY CLINIC PRESENTATION</footer>

  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/ScrollTrigger.min.js"></script>
  <script>
    gsap.registerPlugin(ScrollTrigger);

    /* ===========================
       로더 페이드아웃
       =========================== */
    window.addEventListener("load", () => {
      gsap.to("#loader", { autoAlpha: 0, duration: 0.5, ease: "power2.out", delay: 0.3 });
    });

    /* ===========================
       히어로 이미지: 강한 지속 애니메이션 (대관람차급)
       =========================== */
    const heroImg = document.getElementById("heroImg");

    // 1. 느린 좌→우→좌 패닝 (끊임없이)
    gsap.to(heroImg, {
      xPercent: 3,
      duration: 8,
      ease: "sine.inOut",
      repeat: -1,
      yoyo: true
    });

    // 2. 동시에 줌인/줌아웃 (호흡하는 느낌)
    gsap.to(heroImg, {
      scale: 1.12,
      duration: 10,
      ease: "sine.inOut",
      repeat: -1,
      yoyo: true
    });

    // 3. 미세한 회전 (살아있는 느낌)
    gsap.to(heroImg, {
      rotate: 0.8,
      duration: 12,
      ease: "sine.inOut",
      repeat: -1,
      yoyo: true
    });

    // 4. 밝기 맥동 (빛이 숨쉬는 느낌)
    gsap.to(heroImg, {
      filter: "brightness(1.15)",
      duration: 4,
      ease: "sine.inOut",
      repeat: -1,
      yoyo: true
    });

    /* ===========================
       이미지 섹션: 통째로 좌→우 슬라이드 등장 → 정적 고정
       =========================== */
    gsap.utils.toArray(".static-section").forEach((section) => {
      gsap.fromTo(section,
        { x: -500, opacity: 0 },
        {
          x: 0,
          opacity: 1,
          duration: 1.5,
          ease: "power4.out",
          scrollTrigger: {
            trigger: section,
            start: "top 90%",
            toggleActions: "play none none none"
          },
          onComplete: () => gsap.set(section, { clearProps: "all" })
        }
      );
    });

    /* ===========================
       네비게이션 스크롤 숨김
       =========================== */
    let lastY = 0;
    const nav = document.getElementById("nav");
    window.addEventListener("scroll", () => {
      const y = window.scrollY;
      nav.style.transform = (y > lastY && y > 180) ? "translateY(-100%)" : "translateY(0)";
      nav.style.transition = "transform .4s ease";
      lastY = y;
    });
  </script>
</body>
</html>
