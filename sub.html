<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>젤피부과 | 탄력&리프팅</title>
  <meta name="description" content="젤피부과 탄력&리프팅 - 맞춤형 에너지 기반 리주버네이션 프로그램" />
  <meta property="og:title" content="젤피부과 | 탄력&리프팅" />
  <meta property="og:description" content="맞춤형 에너지 기반 리주버네이션 프로그램을 경험하세요." />
  <meta property="og:image" content="images/sub_hero.jpg" />
  <meta property="og:type" content="website" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Pretendard:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #070d1a;
      --gold: #c9a96e;
      --text: #eef2ff;
      --muted: rgba(238, 242, 255, 0.72);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { background: var(--bg); color: var(--text); overflow-x: hidden; }
    body { font-family: "Pretendard", "Noto Sans KR", sans-serif; }
    img { width: 100%; display: block; }

    .pc-only {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 99999;
      background: #02060f;
      color: #fff;
      font-size: 18px;
      letter-spacing: .05em;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
    }
    @media (max-width: 1199px) { .pc-only { display: flex; } }

    .loader {
      position: fixed;
      inset: 0;
      z-index: 9999;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at 52% 30%, #101f3f 0%, #081125 52%, #04070f 100%);
    }
    .loader h1 {
      font-family: "Playfair Display", serif;
      color: var(--gold);
      font-size: clamp(32px, 4vw, 58px);
      letter-spacing: .26em;
      animation: pulse 1.8s infinite ease-in-out;
    }
    @keyframes pulse {
      0%,100% { opacity: .45; text-shadow: 0 0 0 rgba(201,169,110,0); }
      50% { opacity: 1; text-shadow: 0 0 30px rgba(201,169,110,.45); }
    }

    .nav {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      z-index: 999;
      border-bottom: 1px solid rgba(255,255,255,.08);
      background: linear-gradient(180deg, rgba(7,13,26,.88), rgba(7,13,26,.56));
      backdrop-filter: blur(10px);
    }
    .nav-inner {
      width: min(1680px, calc(100vw - 120px));
      height: 84px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .logo {
      font-family: "Playfair Display", serif;
      font-size: 28px;
      letter-spacing: .2em;
      color: var(--gold);
      text-decoration: none;
    }
    .nav ul { list-style: none; display: flex; gap: 34px; }
    .nav a {
      color: var(--text);
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      letter-spacing: .09em;
      position: relative;
      padding: 4px 0;
    }
    .nav a::after {
      content: "";
      position: absolute;
      left: 0;
      bottom: -4px;
      width: 0;
      height: 1px;
      background: var(--gold);
      transition: width .35s ease;
    }
    .nav a:hover::after,
    .nav a.active::after { width: 100%; }

    .sub-hero {
      position: relative;
      min-height: 100vh;
      overflow: hidden;
      background: #050a14;
      perspective: 900px;
    }
    .sub-hero-media {
      position: absolute;
      inset: 0;
      background: url("images/sub_hero.jpg") center center / cover no-repeat;
      will-change: transform;
    }
    .sub-hero::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 72% 18%, rgba(201,169,110,.24), transparent 34%),
        linear-gradient(180deg, rgba(3,8,16,.15) 0%, rgba(3,8,16,.84) 100%);
      z-index: 1;
    }
    .sub-hero-copy {
      position: relative;
      z-index: 2;
      min-height: 100vh;
      display: grid;
      place-items: center;
      text-align: center;
      padding-top: 80px;
    }
    .sub-hero-copy h1 {
      font-family: "Playfair Display", serif;
      font-size: clamp(42px, 5vw, 82px);
      letter-spacing: .08em;
      margin-bottom: 14px;
    }
    .sub-hero-copy h1 span { color: var(--gold); }
    .sub-hero-copy p {
      font-size: clamp(12px, 1vw, 16px);
      color: var(--muted);
      letter-spacing: .22em;
    }

    .section {
      position: relative;
      width: min(1920px, 100%);
      margin: 0 auto;
      transform-style: preserve-3d;
      background: linear-gradient(180deg, rgba(7,13,26,.98), rgba(4,8,17,.98));
    }
    .section::before {
      content: "";
      position: absolute;
      left: 0;
      top: 0;
      width: 100%;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(201,169,110,.35), transparent);
      z-index: 2;
    }

    /* === Gemini 합성: 빛 반사 스윕 === */
    .section::after {
      content: "";
      position: absolute;
      inset: 0;
      z-index: 5;
      pointer-events: none;
      background: linear-gradient(
        115deg,
        transparent 0%, transparent 35%,
        rgba(201,169,110,.12) 42%,
        rgba(255,255,255,.08) 45%,
        rgba(201,169,110,.12) 48%,
        transparent 55%, transparent 100%
      );
      background-size: 300% 100%;
      background-position: 200% 0;
      opacity: 0;
      transition: opacity .4s;
    }
    .section.in-view::after {
      opacity: 1;
      animation: lightSweep 1.8s ease-out forwards;
    }
    @keyframes lightSweep {
      from { background-position: 200% 0; }
      to { background-position: -100% 0; }
    }

    /* === 시네마틱 비네팅 === */
    .vignette {
      position: fixed;
      inset: 0;
      z-index: 998;
      pointer-events: none;
      background: radial-gradient(
        ellipse 70% 65% at 50% 50%,
        transparent 55%,
        rgba(4,7,15,.55) 100%
      );
    }

    /* === 골드 글로우 펄스 === */
    .gold-glow {
      position: absolute;
      width: 420px;
      height: 420px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(201,169,110,.18), transparent 70%);
      pointer-events: none;
      z-index: 2;
      filter: blur(60px);
      opacity: 0;
    }

    /* === 리빌 라인 === */
    .reveal-line {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 2px;
      z-index: 6;
      background: linear-gradient(90deg, transparent 0%, var(--gold) 50%, transparent 100%);
      transform: scaleX(0);
      transform-origin: center;
    }
    .section.in-view .reveal-line {
      animation: revealLine 1.2s ease-out forwards;
    }
    @keyframes revealLine {
      from { transform: scaleX(0); }
      to { transform: scaleX(1); }
    }

    .sub-hero-copy h1 {
      text-shadow: 0 0 60px rgba(201,169,110,.25);
    }

    footer {
      padding: 24px 0 40px;
      text-align: center;
      color: rgba(255,255,255,.58);
      font-size: 12px;
      letter-spacing: .12em;
      background: #050912;
    }
  </style>
</head>
<body>
  <div class="pc-only">PC 전용 프레젠테이션 페이지입니다.<br />1200px 이상 해상도에서 확인해 주세요.</div>

  <div class="vignette"></div>
  <div class="loader" id="loader"><h1>LIFTING</h1></div>

  <nav class="nav" id="nav">
    <div class="nav-inner">
      <a class="logo" href="index.html">ZELL</a>
      <ul>
        <li><a href="index.html">MAIN</a></li>
        <li><a class="active" href="sub.html">탄력&리프팅</a></li>
        <li><a href="#">DEVICE</a></li>
        <li><a href="#">PROGRAM</a></li>
        <li><a href="#">RESERVATION</a></li>
      </ul>
    </div>
  </nav>

  <header class="sub-hero" id="subHero">
    <div class="sub-hero-media" id="subHeroMedia"></div>
    <div class="sub-hero-copy">
      <div>
        <h1><span>Elasticity</span> & Lifting</h1>
        <p>PERSONALIZED ENERGY-BASED REJUVENATION PLAN</p>
      </div>
    </div>
  </header>

  <section class="section fx" data-side="left" data-depth="normal"><div class="reveal-line"></div><img src="images/sub_nav.jpg" alt="탄력 리프팅 메뉴" loading="lazy" /></section>
  <section class="section fx" data-side="right" data-depth="normal"><div class="reveal-line"></div><img src="images/sub_intro.jpg" alt="탄력 리프팅 소개" loading="lazy" /></section>
  <section class="section fx" data-side="bottom" data-depth="device"><div class="reveal-line"></div><div class="gold-glow"></div><img src="images/sub_device.jpg" alt="탄력 리프팅 장비" loading="lazy" /></section>
  <section class="section fx" data-side="left" data-depth="normal"><div class="reveal-line"></div><img src="images/sub_features.jpg" alt="탄력 리프팅 특징" loading="lazy" /></section>
  <section class="section fx" data-side="right" data-depth="normal"><div class="reveal-line"></div><img src="images/sub_positions.jpg" alt="탄력 리프팅 시술부위" loading="lazy" /></section>
  <section class="section fx" data-side="bottom" data-depth="normal"><div class="reveal-line"></div><img src="images/sub_custom.jpg" alt="탄력 리프팅 맞춤 프로그램" loading="lazy" /></section>
  <section class="section fx" data-side="left" data-depth="normal"><div class="reveal-line"></div><div class="gold-glow"></div><img src="images/sub_point.jpg" alt="탄력 리프팅 포인트" loading="lazy" /></section>
  <section class="section fx" data-side="right" data-depth="normal"><div class="reveal-line"></div><img src="images/sub_body.jpg" alt="바디 리프팅" loading="lazy" /></section>
  <section class="section fx" data-side="left" data-depth="normal"><div class="reveal-line"></div><img src="images/sub_eye.jpg" alt="아이 리프팅" loading="lazy" /></section>
  <section class="section fx" data-side="right" data-depth="normal"><div class="reveal-line"></div><img src="images/sub_neck.jpg" alt="넥 리프팅" loading="lazy" /></section>
  <section class="section fx" data-side="bottom" data-depth="normal"><div class="reveal-line"></div><img src="images/sub_caution.jpg" alt="주의사항" loading="lazy" /></section>
  <section class="section fx" data-side="left" data-depth="normal"><div class="reveal-line"></div><img src="images/sub_footer.jpg" alt="탄력 리프팅 푸터" loading="lazy" /></section>

  <footer>© ZELL DERMATOLOGY CLINIC - ELASTICITY & LIFTING</footer>

  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/ScrollTrigger.min.js"></script>
  <script>
    gsap.registerPlugin(ScrollTrigger);

    window.addEventListener("load", () => {
      gsap.to("#loader", {
        autoAlpha: 0,
        duration: 0.8,
        ease: "power2.out",
        delay: 0.8
      });
    });

    const hero = document.getElementById("subHeroMedia");
    gsap.to(hero, {
      scale: 1.16,
      xPercent: -1.5,
      yPercent: -2,
      duration: 16,
      ease: "sine.inOut",
      repeat: -1,
      yoyo: true
    });

    gsap.to(hero, {
      y: 120,
      ease: "none",
      scrollTrigger: {
        trigger: "#subHero",
        start: "top top",
        end: "bottom top",
        scrub: true
      }
    });

    gsap.from(".sub-hero-copy h1", { y: 80, opacity: 0, duration: 1.1, delay: 0.55, ease: "power3.out" });
    gsap.from(".sub-hero-copy p", { y: 40, opacity: 0, duration: 1.0, delay: 0.8, ease: "power3.out" });

    gsap.utils.toArray(".fx").forEach((section, idx) => {
      const side = section.dataset.side;
      const depth = section.dataset.depth;

      const fromVars = {
        opacity: 0,
        scale: 0.87,
        rotate: side === "bottom" ? -5 : side === "left" ? -9 : 9,
        y: side === "bottom" ? 170 : 0,
        x: side === "left" ? -210 : side === "right" ? 210 : 0
      };

      if (depth === "device") {
        fromVars.rotateY = side === "left" ? -26 : 26;
        fromVars.rotateX = 12;
        fromVars.z = -100;
        gsap.to(section.querySelector("img"), {
          rotateY: 7,
          rotateX: 2,
          duration: 2.5,
          repeat: -1,
          yoyo: true,
          ease: "sine.inOut"
        });
      }

      gsap.fromTo(section, fromVars, {
        opacity: 1,
        x: 0,
        y: 0,
        z: 0,
        rotate: 0,
        rotateY: 0,
        rotateX: 0,
        scale: 1,
        duration: 1.3,
        ease: "power4.out",
        scrollTrigger: {
          trigger: section,
          start: "top 82%",
          end: "top 30%",
          toggleActions: "play none none reverse"
        }
      });

      gsap.fromTo(section.querySelector("img"),
        { scale: 1.06, filter: "brightness(.82)" },
        {
          scale: 1,
          filter: "brightness(1)",
          ease: "none",
          scrollTrigger: {
            trigger: section,
            start: "top bottom",
            end: "bottom top",
            scrub: true
          }
        }
      );

      if (idx % 2 === 0) {
        gsap.to(section, {
          y: -40,
          ease: "none",
          scrollTrigger: {
            trigger: section,
            start: "top bottom",
            end: "bottom top",
            scrub: true
          }
        });
      }
    });

    /* === Gemini 합성: in-view 트리거 === */
    gsap.utils.toArray(".fx").forEach(section => {
      ScrollTrigger.create({
        trigger: section,
        start: "top 80%",
        onEnter: () => section.classList.add("in-view"),
        onLeaveBack: () => section.classList.remove("in-view")
      });
    });

    /* === 골드 글로우 부유 === */
    document.querySelectorAll(".gold-glow").forEach((glow, i) => {
      gsap.set(glow, { left: i % 2 === 0 ? "15%" : "65%", top: "30%" });
      gsap.to(glow, {
        opacity: 0.7,
        scale: 1.3,
        x: gsap.utils.random(-60, 60),
        y: gsap.utils.random(-40, 40),
        duration: gsap.utils.random(4, 7),
        repeat: -1, yoyo: true,
        ease: "sine.inOut",
        delay: i * 0.8
      });
    });

    let lastY = 0;
    const nav = document.getElementById("nav");
    window.addEventListener("scroll", () => {
      const y = window.scrollY;
      nav.style.transform = (y > lastY && y > 180) ? "translateY(-100%)" : "translateY(0)";
      nav.style.transition = "transform .4s ease";
      lastY = y;
    });
  </script>
</body>
</html>
